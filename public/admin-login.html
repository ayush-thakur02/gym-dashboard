<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — 44 Fitness Center</title>
    <link rel="stylesheet" href="/assets/css/global.css" />
    <style>
        body {
            overflow: hidden;
            height: 100vh;
        }

        .bg-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 0%, #e8edf5 0%, #f0f2f7 100%);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: drift1 20s ease-in-out infinite alternate;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -80px;
            animation: drift2 24s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-40px, 40px);
            }
        }

        @keyframes drift2 {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(30px, -30px);
            }
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
        }

        .card {
            width: 100%;
            max-width: 400px;
            border-radius: var(--radius-2xl);
            padding: 40px 36px;
            animation: cardIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .icon-wrap {
            width: 60px;
            height: 60px;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            color: var(--accent);
            /* box-shadow: 0 0 28px rgba(37, 99, 235, 0.12); */
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #login-btn {
            height: 48px;
            font-size: 0.9375rem;
            font-weight: 600;
            background: var(--accent);
            /* box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15); */
            border-radius: var(--radius-lg);
            width: 100%;
            transition: all 0.2s;
            margin-top: 4px;
        }

        #login-btn:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            /* box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15); */
        }

        #login-btn:active {
            transform: translateY(0);
        }

        #error-msg {
            display: none;
            padding: 11px 14px;
            background: var(--danger-muted);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--danger);
        }

        .card-footer {
            margin-top: 22px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .card-footer a {
            color: var(--text-secondary);
        }

        .card-footer a:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <div class="bg-wrap">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <a href="/" class="btn btn-ghost btn-sm back-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Back
    </a>

    <main class="page">
        <div class="card glass-strong">
            <div class="icon-wrap">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
            </div>

            <h1>Admin Portal</h1>
            <p class="subtitle">Authorized access only</p>

            <form class="form" id="login-form">
                <div class="input-group">
                    <label class="input-label" for="username">Username</label>
                    <div class="input-icon-wrap">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input id="username" class="input" type="text" placeholder="admin" autocomplete="username"
                            required />
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Password</label>
                    <div class="input-icon-wrap">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input id="password" class="input" type="password" placeholder="••••••••"
                            autocomplete="current-password" required />
                    </div>
                </div>

                <div id="error-msg"></div>

                <button id="login-btn" type="submit" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
                    </svg>
                    Sign In
                </button>
            </form>

            <div class="card-footer">
                <a href="/">← Return to member check-in</a>
            </div>
        </div>
    </main>

    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/admin-login.js"></script>
</body>

</html>
