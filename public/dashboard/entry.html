<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Entry — 44 Fitness Center</title>
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
</head>

<body data-page="entry">
    <div id="toast-container"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M6 4v16M18 4v16M6 9H4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2M18 9h2a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-2M6 7h12v10H6z" />
                </svg>
            </div>
            <div class="sidebar-logo-text">
                <span class="sidebar-gym-name">44 Fitness</span>
                <span class="sidebar-gym-sub">Management</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard/overview" class="nav-item" data-page="overview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                <span>Overview</span>
            </a>
            <a href="/dashboard/members" class="nav-item" data-page="members">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <span>Members</span>
            </a>
            <a href="/dashboard/payments" class="nav-item" data-page="payments">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                    <line x1="1" y1="10" x2="23" y2="10" />
                </svg>
                <span>Payments</span>
            </a>
            <a href="/dashboard/entry" class="nav-item" data-page="entry">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span>Daily Entry</span>
            </a>
            <a href="/dashboard/settings" class="nav-item" data-page="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                <span>Settings</span>
            </a>
        </nav>
        </div>
        </div>
        <button class="logout-btn" id="logout-btn" title="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
            </svg>
        </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-wrap">
        <header class="mobile-header">
            <button class="hamburger" id="hamburger">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <span class="mobile-title">Daily Entry</span>
            <div style="width:32px"></div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2 class="page-title">Daily Entry</h2>
                    <p class="page-subtitle">Check-in log and attendance analytics</p>
                </div>
            </div>

            <!-- Filter toolbar -->
            <div class="toolbar glass entry-toolbar">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="today">Today</button>
                    <button class="filter-tab" data-filter="date">Specific Date</button>
                    <button class="filter-tab" data-filter="month">Month</button>
                </div>

                <div id="filter-date-wrap" class="filter-extra" style="display:none">
                    <input id="filter-date" class="input" type="date" style="width:auto;" />
                </div>
                <div id="filter-month-wrap" class="filter-extra" style="display:none">
                    <div class="select-wrap">
                        <select id="filter-month" class="input" style="width:auto;">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        <span class="select-chevron">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9" />
                            </svg>
                        </span>
                    </div>
                    <div class="select-wrap">
                        <select id="filter-year" class="input" style="width:auto;"></select>
                        <span class="select-chevron">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9" />
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="input-icon-wrap" style="flex:1;max-width:280px;margin-left:auto;">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input id="entry-search" class="input" type="search" placeholder="Search name or phone…" />
                </div>
            </div>

            <!-- Entry chart -->
            <div class="chart-card glass" id="entry-chart-wrap">
                <div class="chart-header">
                    <span class="chart-title" id="entry-chart-title">Today's Hourly Traffic</span>
                    <span class="badge badge-blue" id="entry-count-badge">0 entries</span>
                </div>
                <div style="position:relative;width:100%;height:220px;">
                    <canvas id="entry-chart"></canvas>
                </div>
            </div>

            <!-- Entry table -->
            <div class="table-wrap glass" style="margin-top:20px;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Date</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="entry-tbody">
                        <tr>
                            <td colspan="4" class="table-loading">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-wrap" id="entry-pagination"></div>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/entry.js"></script>
</body>

</html>
