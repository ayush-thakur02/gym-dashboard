<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Detail — 44 Fitness Center</title>
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/dashboard.css" />
</head>

<body data-page="overview">
    <div id="toast-container"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M6 4v16M18 4v16M6 9H4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2M18 9h2a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-2M6 7h12v10H6z" />
                </svg>
            </div>
            <div class="sidebar-logo-text">
                <span class="sidebar-gym-name">44 Fitness</span>
                <span class="sidebar-gym-sub">Management</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard/overview" class="nav-item" data-page="overview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                <span>Overview</span>
            </a>
            <a href="/dashboard/members" class="nav-item" data-page="members">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <span>Members</span>
            </a>
            <a href="/dashboard/payments" class="nav-item" data-page="payments">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                    <line x1="1" y1="10" x2="23" y2="10" />
                </svg>
                <span>Payments</span>
            </a>
            <a href="/dashboard/entry" class="nav-item" data-page="entry">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span>Daily Entry</span>
            </a>
            <a href="/dashboard/settings" class="nav-item" data-page="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                <span>Settings</span>
            </a>
        </nav>
        </div>
        </div>
        <button class="logout-btn" id="logout-btn" title="Sign out">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
            </svg>
        </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-wrap">
        <header class="mobile-header">
            <button class="hamburger" id="hamburger">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <span class="mobile-title">Monthly Detail</span>
            <div style="width:32px"></div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-back">
                    <a href="/dashboard/overview" class="btn btn-ghost btn-sm">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                        Back
                    </a>
                    <div>
                        <h2 class="page-title">Monthly Breakdown</h2>
                        <p class="page-subtitle">All time — check-ins, payments &amp; revenue</p>
                    </div>
                </div>
            </div>

            <!-- Summary cards -->
            <div class="stats-grid" id="summary-cards" style="margin-bottom:20px;">
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(37,99,235,0.1);color:#2563eb;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-checkins">—</div>
                        <div class="stat-label">Total Check-ins</div>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(22,163,74,0.1);color:#16a34a;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                            <line x1="1" y1="10" x2="23" y2="10" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-payments">—</div>
                        <div class="stat-label">Total Payments</div>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(217,119,6,0.1);color:#d97706;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23" />
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="total-revenue">—</div>
                        <div class="stat-label">Total Revenue</div>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon" style="background:rgba(124,58,237,0.1);color:#7c3aed;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                            <polyline points="17 6 23 6 23 12" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-value" id="avg-checkins">—</div>
                        <div class="stat-label">Avg Check-ins / Month</div>
                    </div>
                </div>
            </div>

            <!-- Detail table -->
            <div class="glass" style="border-radius: 15px;">
                <div class="table-wrap">
                    <table class="data-table" id="detail-table">
                        <thead>
                            <tr>
                                <th>Month</th>
                                <th class="text-right">Check-ins</th>
                                <th class="text-right">Payments</th>
                                <th class="text-right">Revenue</th>
                                <th class="text-right">Avg / Day</th>
                            </tr>
                        </thead>
                        <tbody id="detail-tbody">
                            <tr>
                                <td colspan="5" class="table-empty">Loading…</td>
                            </tr>
                        </tbody>
                        <tfoot id="detail-tfoot"></tfoot>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/monthly-detail.js"></script>
</body>

</html>
